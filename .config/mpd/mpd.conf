# Required Files and Directories
music_directory    "/home/zek11/Music"
playlist_directory "/home/zek11/.config/mpd/playlists"
db_file            "/home/zek11/.config/mpd/database"
log_file           "/home/zek11/.config/mpd/log"
pid_file           "/home/zek11/.config/mpd/pid"
state_file         "/home/zek11/.config/mpd/state"
sticker_file       "/home/zek11/.config/mpd/sticker.sql"

# Network Settings
bind_to_address    "127.0.0.1"
port               "6600"

# Audio Output (Example for ALSA)
audio_output {
    type           "alsa"
    name           "My ALSA Device"
    # mixer_type   "software"      # Uncomment for software volume control
}

# Optional: Visualizer (Example for ncmpcpp)
audio_output {
    type           "fifo"
    name           "my_fifo"
    path           "/tmp/mpd.fifo"
    format         "44100:16:2"
}
