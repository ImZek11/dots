general {
    gaps_in = 20
    gaps_out = 25,45,25,45

    border_size = 4

    col.active_border = $blue
    col.inactive_border = $surface2

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
    enabled = true
    size = 3
    passes = 1

    vibrancy = 0.1696
    }
}
